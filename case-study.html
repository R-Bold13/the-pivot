    <script>
        function toggleSound(btn) {
            const video = btn.closest('.module-media').querySelector('#main-video');
            const label = btn.querySelector('.sound-label');
            video.muted = !video.muted;
            label.textContent = video.muted ? 'Click for sound' : 'Mute';
        }
    </script>
